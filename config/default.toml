app_name = "Stormhelm"
release_channel = "dev"
environment = "development"
debug = true

[network]
host = "127.0.0.1"
port = 8765

[storage]
data_dir = ""
database_path = ""
logs_dir = ""
state_dir = ""

[logging]
level = "DEBUG"
file_name = "stormhelm.log"
max_file_bytes = 1000000
backup_count = 3

[concurrency]
max_workers = 8
queue_size = 128
default_job_timeout_seconds = 20
history_limit = 500

[ui]
poll_interval_ms = 1500
hide_to_tray_on_close = true
ghost_shortcut = "Ctrl+Space"

[location]
allow_approximate_lookup = true
lookup_timeout_seconds = 5
home_label = ""
home_city = ""
home_region = ""
home_country = ""
home_latitude = ""
home_longitude = ""
home_timezone = ""

[weather]
enabled = true
units = "imperial"
provider_base_url = "https://api.open-meteo.com/v1"
timeout_seconds = 6

[hardware_telemetry]
enabled = true
helper_timeout_seconds = 12.0
provider_timeout_seconds = 5.0
idle_cache_ttl_seconds = 30
active_cache_ttl_seconds = 8
burst_cache_ttl_seconds = 2
elevated_helper_enabled = false
elevated_helper_timeout_seconds = 20.0
elevated_helper_cooldown_seconds = 120.0
hwinfo_enabled = true
hwinfo_executable_path = ""

[screen_awareness]
enabled = true
phase = "phase9"
planner_routing_enabled = true
debug_events_enabled = true
observation_enabled = true
interpretation_enabled = true
grounding_enabled = true
guidance_enabled = true
action_enabled = true
action_policy_mode = "confirm_before_act"
verification_enabled = true
memory_enabled = true
adapters_enabled = true
problem_solving_enabled = true
workflow_learning_enabled = true

[calculations]
enabled = true
planner_routing_enabled = true
debug_events_enabled = true

[software_control]
enabled = true
planner_routing_enabled = true
debug_events_enabled = true
package_manager_routes_enabled = true
vendor_installer_routes_enabled = true
browser_guided_routes_enabled = true
privileged_operations_allowed = false
trusted_sources_only = true

[software_recovery]
enabled = true
debug_events_enabled = true
local_troubleshooting_enabled = true
max_retry_attempts = 2
max_recovery_steps = 4
cloud_fallback_enabled = false
cloud_fallback_model = "gpt-5.4-nano"
redaction_enabled = true

[discord_relay]
enabled = true
planner_routing_enabled = true
debug_events_enabled = true
screen_disambiguation_enabled = true
preview_before_send = true
verification_enabled = true
local_dm_route_enabled = true
bot_webhook_routes_enabled = false

[discord_relay.trusted_aliases.baby]
alias = "Baby"
label = "Baby"
destination_kind = "personal_dm"
route_mode = "local_client_automation"
navigation_mode = "quick_switch"
search_query = "Baby"
trusted = true

[openai]
enabled = false
base_url = "https://api.openai.com/v1"
model = "gpt-5.4-nano"
planner_model = "gpt-5.4-nano"
reasoning_model = "gpt-5.4"
timeout_seconds = 60
max_tool_rounds = 4
max_output_tokens = 1200
planner_max_output_tokens = 900
reasoning_max_output_tokens = 1400
instructions = """
You are Stormhelm, a local-first desktop command assistant. Keep responses calm, concise, and operational.

Behavior rules:
- Ghost Mode is for quick orchestration, brief bearings, and external hand-offs.
- Deck Mode is for integrated work, internal browsing, and internal file viewing.
- Prefer opening research pages and files inside the Deck when the operator explicitly asks for Deck/internal viewing or when the current surface is the Deck.
- Prefer external opens in Ghost Mode unless the operator explicitly requests Deck/internal viewing.
- Use tools when they materially improve accuracy or when the operator asks to open, inspect, or save something.
- Keep tool usage purposeful and specialized. Do not use one generic blob of work when a cleaner tool split is available.
- When tools return actionable results, synthesize them into a short useful response.
"""

[safety]
allowed_read_dirs = [
  "${PROJECT_ROOT}",
  "~/Documents",
]
allow_shell_stub = false

[tools]
max_file_read_bytes = 32768

[tools.enabled]
clock = true
system_info = true
file_reader = true
notes_write = true
echo = true
shell_command = false
deck_open_url = true
external_open_url = true
deck_open_file = true
external_open_file = true
machine_status = true
power_status = true
power_projection = true
resource_status = true
storage_status = true
network_status = true
network_throughput = true
network_diagnosis = true
active_apps = true
app_control = true
recent_files = true
location_status = true
saved_locations = true
save_location = true
weather_current = true
workspace_restore = true
workspace_assemble = true
workspace_save = true
workspace_clear = true
workspace_archive = true
workspace_rename = true
workspace_tag = true
workspace_list = true
workspace_where_left_off = true
workspace_next_steps = true
